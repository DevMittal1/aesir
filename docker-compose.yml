version: "3.8"

services:
  web:
    build: .
    container_name: instagram-webhook-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    # Override standard CMD for development environment with reload enabled
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317" # OTLP gRPC port
